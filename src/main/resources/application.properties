# Server Configuration
sever.address=0.0.0.0
server.port=8081
spring.application.name=module-communication

# H2 Database Configuration (In-memory)
spring.datasource.url=jdbc:h2:mem:communication_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# WebSocket Configuration
spring.websocket.message-size-limit=65536

# JWT Configuration
jwt.secret=YourSecretKeyForJWTTokenGenerationAndValidation2024SecureKey
jwt.expiration=86400000

# STUN/TURN Configuration
webrtc.stun.url=stun:stun.l.google.com:19302
webrtc.turn.url=turn:turn.example.com:3478
webrtc.turn.username=user
webrtc.turn.password=password

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.communication=DEBUG

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8081
